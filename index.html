<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Smart CV Reader ✨</title>
    
    <!-- นำเข้า Tailwind CSS (ใช้สำหรับตกแต่งหน้าเว็บให้สวยงาม) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- นำเข้า PDF.js (เครื่องมือสำหรับอ่านตัวหนังสือจากไฟล์ PDF) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    
    <!-- เพิ่มใหม่: นำเข้า ExcelJS (เครื่องมือสร้างและตกแต่งไฟล์ Excel) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

    <!-- นำเข้า Font Awesome (สำหรับใส่ไอคอนสวยๆ) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- นำเข้า Google Font (Kanit) เพื่อให้ตัวหนังสือภาษาไทยอ่านง่าย -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* ตั้งค่าฟอนต์หลักของเว็บ */
        body {
            font-family: 'Kanit', sans-serif;
            /* สร้างพื้นหลังแบบไล่สี (Gradient) */
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            min-height: 100vh;
        }

        /* สไตล์กล่องกระจก (Glassmorphism) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        /* เอฟเฟกต์ตอนลากไฟล์มาวางทับ */
        .dragover {
            background: rgba(255, 255, 255, 0.95) !important;
            border-color: #fda085 !important;
            transform: scale(1.02);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto glass-panel p-6 md:p-10">
        <!-- ส่วนหัวของโปรแกรม -->
        <div class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-800 mb-2">
                <i class="fa-solid fa-magic-wand-sparkles text-orange-500"></i> HR Smart CV Reader
            </h1>
            <p class="text-gray-600">ผู้ช่วย AI ดึงข้อมูลจาก Resume อัตโนมัติ แล้วส่งออกเป็น Excel</p>
        </div>

        <!-- กล่องสำหรับอัปโหลดไฟล์ (Drag & Drop) -->
        <div id="drop-zone" class="border-4 border-dashed border-gray-300 rounded-xl p-10 text-center bg-white bg-opacity-50 transition-all duration-300 cursor-pointer hover:bg-opacity-80">
            <i class="fa-regular fa-file-pdf text-6xl text-gray-400 mb-4"></i>
            <h3 class="text-xl font-semibold text-gray-700">คลิกเพื่อเลือกไฟล์ หรือ ลากไฟล์ PDF มาวางตรงนี้</h3>
            <p class="text-gray-500 mt-2">รองรับการอัปโหลดครั้งละหลายไฟล์</p>
            <input type="file" id="file-input" class="hidden" accept=".pdf" multiple>
        </div>

        <!-- สถานะการทำงาน (โหลดดิ้ง) -->
        <div id="status-message" class="text-center mt-6 text-orange-600 font-medium hidden">
            <i class="fa-solid fa-spinner fa-spin mr-2"></i> กำลังให้ AI อ่านข้อมูล... กรุณารอสักครู่ (อาจใช้เวลา 5-10 วินาทีต่อไฟล์)
        </div>

        <!-- ตารางแสดงผลข้อมูลที่ดึงมาได้ -->
        <div class="mt-10 overflow-x
