<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Smart CV Reader v9 ✨</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }
        .dragover {
            background: rgba(255, 255, 255, 1) !important;
            border-color: #6366f1 !important;
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto glass-panel p-6 md:p-10">
        <div class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-800 mb-2">
                <i class="fa-solid fa-microchip text-indigo-600"></i> HR Smart CV Reader <span class="text-indigo-500 text-2xl">v9</span>
            </h1>
            <p class="text-gray-600 font-medium">ระบบสแกนสมอง AI อัตโนมัติ (แก้ปัญหา Model Not Found)</p>
        </div>

        <div class="mb-8 bg-indigo-50 p-5 rounded-xl border border-indigo-200 shadow-sm">
            <label class="block text-sm font-bold text-gray-800 mb-2">
                <i class="fa-solid fa-key text-indigo-500"></i> 1. กรอก Google Gemini API Key (ขึ้นต้นด้วย AIza...) 
            </label>
            <div class="flex flex-col gap-3">
                <div class="flex flex-col sm:flex-row gap-2">
                    <input type="password" id="api-key-input" placeholder="AIzaSy..." 
                           class="flex-1 px-4 py-3 border border-indigo-300 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none font-mono">
                    <button onclick="clearSettings()" class="bg-red-500 text-white px-4 py-3 rounded-lg hover:bg-red-600 transition font-medium" title="ล้างกุญแจเก่าที่พังแล้ว">
                        <i class="fa-solid fa-trash"></i> ล้างกุญแจเก่า
                    </button>
                </div>
                
                <label class="block text-sm font-bold text-gray-800 mt-2">
                    <i class="fa-solid fa-radar text-indigo-500"></i> 2. สแกนหารุ่น AI และทดสอบ (ทำตามลำดับ)
                </label>
                <div class="flex flex-col sm:flex-row gap-2">
                    <button onclick="scanModels()" class="bg-indigo-600 text-white px-5 py-3 rounded-lg hover:bg-indigo-700 transition flex-1 font-bold shadow-md">
                        <i class="fa-solid fa-magnifying-glass"></i> กดยืนยันเพื่อสแกนหารุ่น AI
                    </button>
                    
                    <select id="model-select" class="px-4 py-3 border border-indigo-300 rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none bg-white text-gray-700 flex-1 font-medium">
                        <option value="">-- กรุณากดสแกนหารุ่น AI ก่อน --</option>
                    </select>

                    <button onclick="testApiKey()" id="test-btn" class="bg-green-500 text-white px-5 py-3 rounded-lg hover:bg-green-600 transition flex-1 font-bold shadow-md opacity-50 cursor-not-allowed" disabled>
                        <i class="fa-solid fa-check-circle"></i> ทดสอบการดึงข้อมูล
                    </button>
                </div>
            </div>
        </div>

        <div id="debug-box" class="hidden mb-8 bg-red-50 border-l-4 border-red-500 p-4 rounded-r-lg shadow-sm">
            <div class="flex justify-between items-start">
                <h3 class="text-red-800 font-bold mb-2"><i class="fa-solid fa-bug"></i> พบปัญหา:</h3>
                <button onclick="document.getElementById('debug-box').classList.add('hidden')" class="text-gray-400 hover:text-red-500"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <p id="debug-text" class="text-sm text-red-600 font-mono break-words whitespace-pre-wrap"></p>
        </div>

        <div id="drop-zone" class="border-4 border-dashed border-gray-300 rounded-xl p-12 text-center bg-white bg-opacity-50 transition-all duration-300 cursor-pointer hover:bg-indigo-50 relative overflow-hidden">
            <i class="fa-regular fa-file-pdf text-6xl text-indigo-300 mb-4"></i>
            <h3 class="text-2xl font-bold text-gray-700">คลิกที่นี่ หรือ ลากไฟล์ PDF มาวางตรงนี้</h3>
            <p class="text-gray-500 mt-2 text-lg">รองรับการอัปโหลดครั้งละหลายไฟล์</p>
            <input type="file" id="file-input" class="hidden" accept=".pdf" multiple>
        </div>

        <div id="status-message" class="text-center mt-6 text-indigo-600 font-bold hidden p-4 bg-indigo-50 rounded-lg shadow-sm text-lg">
            <i class="fa-solid fa-spinner fa-spin mr-2"></i> <span id="status-text">กำลังทำงาน... กรุณารอสักครู่</span>
        </div>

        <div class="mt-10 overflow-x-auto hidden" id="result-container">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold text-gray-800"><i class="fa-solid fa-users text-indigo-500"></i> ข้อมูลที่ดึงได้</h2>
                <button onclick="exportToExcel()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-lg shadow transition-colors">
                    <i class="fa-solid fa-file-excel mr-2"></i> ดาวน์โหลด Excel
                </button>
            </div>
            
            <table class="w-full text-left border-collapse bg-white rounded-lg overflow-hidden shadow-md text-sm md:text-base">
                <thead class="bg-indigo-800 text-white">
                    <tr>
                        <th class="p-4 font-medium">ชื่อ</th>
                        <th class="p-4 font-medium">นามสกุล</th>
                        <th class="p-4 font-medium">อีเมล</th>
                        <th class="p-4 font-medium">เบอร์ติดต่อ</th>
                        <th class="p-4 font-medium">ตำแหน่งล่าสุด</th>
                        <th class="p-4 font-medium">บริษัทล่าสุด</th>
                        <th class="p-4 font-medium">ทักษะเด่น</th>
                    </tr>
                </thead>
                <tbody id="result-body" class="divide-y divide-gray-200">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const statusMessage = document.getElementById('status-message');
        const statusText = document.getElementById('status-text');
        const resultContainer = document.getElementById('result-container');
        const resultBody = document.getElementById('result-body');
        const apiKeyInput = document.getElementById('api-key-input');
        const modelSelect = document.getElementById('model-select');
        const testBtn = document.getElementById('test-btn');
        const debugBox = document.getElementById('debug-box');
        const debugText = document.getElementById('debug-text');

        let extractedDataList = [];

        window.onload = () => {
            const savedKey = localStorage.getItem('myGeminiKeyV9');
            if(savedKey) {
                apiKeyInput.value = savedKey;
                // ถ้ามีกุญแจ ให้ลองสแกนโมเดลอัตโนมัติ
                scanModels(false);
            }
        };

        function getApiKey() {
            return apiKeyInput.value.trim();
        }

        function clearSettings() {
            localStorage.removeItem('myGeminiKeyV9');
            apiKeyInput.value = '';
            modelSelect.innerHTML = '<option value="">-- กรุณากดสแกนหารุ่น AI ก่อน --</option>';
            testBtn.disabled = true;
            testBtn.classList.add('opacity-50', 'cursor-not-allowed');
            alert("🗑️ ล้างความจำกุญแจเก่าเรียบร้อยครับ วางอันใหม่ได้เลย");
        }

        function showDebugError(errObj) {
            debugBox.classList.remove('hidden');
            let errString = typeof errObj === 'object' ? JSON.stringify(errObj, null, 2) : errObj;
            debugText.innerText = errString;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ฟังก์ชันใหม่เอี่ยม: ให้ระบบไปถาม Google ว่ามี Model ไหนใช้ได้บ้าง
        async function scanModels(showAlert = true) {
            const key = getApiKey();
            debugBox.classList.add('hidden');
            
            if(!key || !key.startsWith("AIza")) {
                if(showAlert) alert("⚠️ กรุณาวาง API Key ของ Google (ขึ้นต้นด้วย AIza...) ในช่องด้านบนก่อนครับ");
                return apiKeyInput.focus();
            }

            statusMessage.classList.remove('hidden');
            statusText.innerText = `กำลังสแกนหารุ่น AI ที่กุญแจนี้มีสิทธิ์ใช้...`;

            try {
                // เรียกใช้ ListModels API เพื่อดึงรายชื่อรุ่นที่มีอยู่จริง
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                const data = await response.json();

                if (data.error) {
                    throw new Error(`Google ปฏิเสธกุญแจนี้: ${data.error.message}`);
                }

                if (data.models && data.models.length > 0) {
                    // กรองเอารุ่นที่ใช้อ่านข้อความได้ (generateContent) และเป็นตระกูล Gemini
                    const validModels = data.models.filter(m => 
                        m.supportedGenerationMethods && 
                        m.supportedGenerationMethods.includes('generateContent') &&
                        m.name.includes('gemini')
                    );

                    if (validModels.length === 0) {
                        throw new Error("กุญแจนี้ถูกต้อง แต่ไม่มีสิทธิ์ใช้ AI รุ่นใดๆ เลยครับ (อาจต้องเปิดใช้งาน API ใน Google Cloud)");
                    }

                    // ล้างตัวเลือกเก่าทิ้ง
                    modelSelect.innerHTML = '';

                    // นำรายชื่อรุ่นที่มีอยู่จริงมาใส่ให้เลือก
                    validModels.forEach(m => {
                        const opt = document.createElement('option');
                        // ตัวอย่าง m.name คือ "models/gemini-1.5-flash"
                        opt.value = `v1beta/${m.name}`; 
                        opt.text = m.displayName || m.name.replace('models/', '');
                        modelSelect.appendChild(opt);
                    });

                    // เปิดให้กดปุ่มทดสอบได้
                    testBtn.disabled = false;
                    testBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    
                    // บันทึกกุญแจ
                    localStorage.setItem('myGeminiKeyV9', key);
                    
                    if(showAlert) alert(`✅ สแกนสำเร็จ! พบ AI ที่ใช้งานได้ ${validModels.length} รุ่น (แสดงในเมนูแล้ว) กรุณากดปุ่ม "ทดสอบการดึงข้อมูล" ต่อได้เลยครับ`);
                } else {
                    throw new Error("ไม่พบรุ่น AI ในระบบของ Google สำหรับกุญแจนี้เลยครับ");
                }
            } catch (error) {
                showDebugError(error.message);
                modelSelect.innerHTML = '<option value="">-- สแกนล้มเหลว กรุณาตรวจสอบกุญแจ --</option>';
            }

            statusMessage.classList.add('hidden');
        }

        // ฟังก์ชันทดสอบแบบเดิม แต่ใช้ Model ที่สแกนเจอแน่นอน
        async function testApiKey() {
            const key = getApiKey();
            const modelPath = modelSelect.value; 
            debugBox.classList.add('hidden'); 
            
            if(!modelPath) {
                return alert("⚠️ กรุณากดสแกนหารุ่น AI ก่อนครับ");
            }

            statusMessage.classList.remove('hidden');
            statusText.innerText = `กำลังทดสอบการทำงานกับ ${modelSelect.options[modelSelect.selectedIndex].text}...`;

            try {
                const apiUrl = `https://generativelanguage.googleapis.com/${modelPath}:generateContent?key=${key}`;
                
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Say OK" }] }] })
                });

                const responseText = await response.text(); 
                
                let result;
                try {
                    result = JSON.parse(responseText);
                } catch(e) {
                    throw new Error("ระบบ AI ส่งข้อมูลกลับมาผิดปกติ: " + responseText);
                }

                if (!response.ok || result.error) {
                    throw new Error(JSON.stringify(result.error || responseText));
                }

                alert(`✅ ผ่านฉลุย! การเชื่อมต่อสมบูรณ์ 100% ลากไฟล์ PDF มาวางเริ่มงานได้เลยครับ 🎉`);
            } catch (error) {
                showDebugError(error.message);
            }

            statusMessage.classList.add('hidden');
        }

        window.addEventListener('dragover', (e) => e.preventDefault());
        window.addEventListener('drop', (e) => e.preventDefault());

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', (e) => { handleFiles(e.target.files); });

        async function handleFiles(files) {
            debugBox.classList.add('hidden');
            if (files.length === 0) return;
            
            const currentApiKey = getApiKey();
            const selectedModel = modelSelect.value;

            if(!currentApiKey || !selectedModel) {
                alert("⚠️ กรุณากดปุ่มสแกนและทดสอบให้ผ่านก่อนลากไฟล์ครับ");
                return;
            }
            
            statusMessage.classList.remove('hidden');
            resultContainer.classList.remove('hidden');

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                if (file.type !== 'application/pdf') {
                    alert(`ไฟล์ ${file.name} ไม่ใช่ PDF ครับ`);
                    continue;
                }

                try {
                    statusText.innerText = `[1/2] แกะข้อความ: ${file.name} ...`;
                    const rawText = await extractTextFromPDF(file);
                    
                    if (!rawText || rawText.trim() === "") {
                        throw new Error("ไฟล์ PDF เป็นรูปภาพสแกน ไม่มีตัวหนังสือให้แกะครับ");
                    }

                    statusText.innerText = `[2/2] วิเคราะห์ข้อมูลด้วย ${modelSelect.options[modelSelect.selectedIndex].text}...`;
                    const structuredData = await processWithAI(rawText, currentApiKey, selectedModel);
                    
                    if(structuredData) {
                        extractedDataList.push(structuredData);
                        addRowToTable(structuredData);
                    }
                } catch (error) {
                    showDebugError(`ไฟล์ ${file.name}: ${error.message}`);
                }
            }

            statusMessage.classList.add('hidden');
            fileInput.value = ''; 
        }

        async function extractTextFromPDF(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = async function() {
                    try {
                        const typedarray = new Uint8Array(this.result);
                        const pdf = await pdfjsLib.getDocument(typedarray).promise;
                        let fullText = "";
                        for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                            const page = await pdf.getPage(pageNum);
                            const textContent = await page.getTextContent();
                            const pageText = textContent.items.map(item => item.str).join(" ");
                            fullText += pageText + " \n";
                        }
                        resolve(fullText);
                    } catch (error) {
                        reject(new Error("อ่าน PDF ไม่ได้ (ไฟล์อาจเสียหรือติดรหัส)"));
                    }
                };
                reader.onerror = () => reject(new Error("เบราว์เซอร์อ่านไฟล์ล้มเหลว"));
                reader.readAsArrayBuffer(file);
            });
        }

        async function processWithAI(text, apiKeyToUse, modelPath) {
            const shortText = text.substring(0, 10000);
            const systemPrompt = `
                คุณคือผู้เชี่ยวชาญด้าน HR หน้าที่ของคุณคือสกัดข้อมูลจากเรซูเม่ (Resume/CV) 
                ให้อ่านข้อความที่ให้มา และดึงข้อมูลต่อไปนี้ออกมา:
                1. ชื่อจริง (ไม่ต้องเอาคำนำหน้า)
                2. นามสกุล
                3. อีเมล (Email)
                4. เบอร์โทรศัพท์
                5. ตำแหน่งงานที่ทำล่าสุด (Recent Job Title)
                6. ชื่อบริษัทที่ทำงานล่าสุด (Recent Company)
                7. ทักษะเด่น (Skills) ให้ดึงมาสัก 3-5 อย่าง คั่นด้วยลูกน้ำ (,)

                หากหาข้อมูลไหนไม่เจอ ให้ใส่ค่าว่าง "" 
                ห้ามอธิบายเพิ่ม ให้ตอบกลับมาเป็น JSON format ตามโครงสร้างด้านล่างนี้เท่านั้น
            `;

            const apiUrl = `https://generativelanguage.googleapis.com/${modelPath}:generateContent?key=${apiKeyToUse}`;

            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: shortText }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] },
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "OBJECT",
                            properties: {
                                firstName: { type: "STRING" }, lastName: { type: "STRING" },
                                email: { type: "STRING" }, phone: { type: "STRING" },
                                recentJobTitle: { type: "STRING" }, recentCompany: { type: "STRING" },
                                skills: { type: "STRING" }
                            },
                            required: ["firstName", "lastName", "email", "phone", "recentJobTitle", "recentCompany", "skills"]
                        }
                    }
                })
            });

            const responseText = await response.text();
            let result;
            try { result = JSON.parse(responseText); } catch(e) { throw new Error("JSON Parse Error: " + responseText); }

            if (!response.ok || result.error) {
                throw new Error(JSON.stringify(result.error || responseText));
            }

            let jsonString = result.candidates[0].content.parts[0].text;
            jsonString = jsonString.replace(/```json/g, "").replace(/```/g, "").trim();
            return JSON.parse(jsonString);
        }

        function addRowToTable(data) {
            const tr = document.createElement('tr');
            tr.className = "hover:bg-indigo-50 transition-colors";
            tr.innerHTML = `
                <td class="p-3 border-b text-gray-800">${data.firstName || '-'}</td>
                <td class="p-3 border-b text-gray-800">${data.lastName || '-'}</td>
                <td class="p-3 border-b text-indigo-600 font-medium">${data.email || '-'}</td>
                <td class="p-3 border-b text-gray-800">${data.phone || '-'}</td>
                <td class="p-3 border-b font-semibold text-gray-700">${data.recentJobTitle || '-'}</td>
                <td class="p-3 border-b text-gray-800">${data.recentCompany || '-'}</td>
                <td class="p-3 border-b text-purple-600">${data.skills || '-'}</td>
            `;
            resultBody.appendChild(tr);
        }

        async function exportToExcel() {
            if (extractedDataList.length === 0) return alert("ยังไม่มีข้อมูลให้ส่งออกครับ");

            const workbook = new ExcelJS.Workbook();
            const worksheet = workbook.addWorksheet('ผู้สมัคร');

            worksheet.columns = [
                { header: 'ชื่อ', key: 'firstName', width: 15 }, { header: 'นามสกุล', key: 'lastName', width: 20 },
                { header: 'อีเมล', key: 'email', width: 30 }, { header: 'เบอร์ติดต่อ', key: 'phone', width: 15 },
                { header: 'ตำแหน่งล่าสุด', key: 'recentJobTitle', width: 30 }, { header: 'บริษัทล่าสุด', key: 'recentCompany', width: 25 },
                { header: 'ทักษะเด่น', key: 'skills', width: 45 }
            ];

            extractedDataList.forEach(data => worksheet.addRow(data));

            const headerRow = worksheet.getRow(1);
            headerRow.font = { bold: true, color: { argb: 'FFFFFFFF' } };
            headerRow.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF4F46E5' } }; 
            headerRow.alignment = { vertical: 'middle', horizontal: 'center' };

            worksheet.eachRow((row, rowNumber) => {
                row.eachCell((cell) => {
                    cell.border = { top: { style: 'thin' }, left: { style: 'thin' }, bottom: { style: 'thin' }, right: { style: 'thin' } };
                    if (rowNumber > 1) cell.alignment = { vertical: 'middle', wrapText: true }; 
                });
            });

            const buffer = await workbook.xlsx.writeBuffer();
            const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "HR_Smart_CV_Data.xlsx");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
