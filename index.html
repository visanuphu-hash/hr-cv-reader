<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Smart CV Reader v13 (Groq) ⚡</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.1);
        }
        .dragover {
            background: rgba(255, 255, 255, 1) !important;
            border-color: #f97316 !important;
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.3);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto glass-panel p-6 md:p-10">
        <div class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-800 mb-2">
                <i class="fa-solid fa-bolt text-orange-500"></i> HR Smart CV Reader <span class="text-orange-600 text-2xl">v13</span>
            </h1>
            <p class="text-gray-600 font-medium">Auto Mode: Llama 3.3 (Groq AI) ⚡</p>
        </div>

        <div id="debug-box" class="hidden mb-8 bg-red-50 border-l-4 border-red-500 p-4 rounded-r-lg shadow-sm">
            <div class="flex justify-between items-start">
                <h3 class="text-red-800 font-bold mb-2"><i class="fa-solid fa-bug"></i> พบปัญหา:</h3>
                <button onclick="document.getElementById('debug-box').classList.add('hidden')" class="text-gray-400 hover:text-red-500"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <p id="debug-text" class="text-sm text-red-600 font-mono break-words whitespace-pre-wrap"></p>
        </div>

        <div id="drop-zone" class="border-4 border-dashed border-orange-300 rounded-xl p-16 text-center bg-slate-50 transition-all duration-300 cursor-pointer hover:bg-orange-50 relative overflow-hidden">
            <i class="fa-regular fa-file-pdf text-6xl text-orange-400 mb-6 drop-shadow-md"></i>
            <h3 class="text-3xl font-bold text-gray-700">คลิกที่นี่ หรือ ลากไฟล์ PDF มาวางตรงนี้</h3>
            <p class="text-gray-500 mt-3 text-lg">ระบบจะวิเคราะห์และสกัดข้อมูลให้โดยอัตโนมัติ (รองรับหลายไฟล์)</p>
            <input type="file" id="file-input" class="hidden" accept=".pdf" multiple>
        </div>

        <div id="status-message" class="text-center mt-6 text-orange-600 font-bold hidden p-4 bg-orange-50 rounded-lg shadow-sm text-lg border border-orange-100">
            <i class="fa-solid fa-spinner fa-spin mr-2"></i> <span id="status-text">กำลังทำงาน... กรุณารอสักครู่</span>
        </div>

        <div class="mt-10 overflow-x-auto hidden" id="result-container">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold text-gray-800"><i class="fa-solid fa-users text-orange-500"></i> ข้อมูลที่ดึงได้</h2>
                <button onclick="exportToExcel()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-lg shadow-md transition-colors transform hover:-translate-y-0.5">
                    <i class="fa-solid fa-file-excel mr-2"></i> ดาวน์โหลด Excel
                </button>
            </div>
            
            <table class="w-full text-left border-collapse bg-white rounded-lg overflow-hidden shadow-md text-sm md:text-base">
                <thead class="bg-gray-800 text-white">
                    <tr>
                        <th class="p-4 font-semibold">ชื่อ</th>
                        <th class="p-4 font-semibold">นามสกุล</th>
                        <th class="p-4 font-semibold">อีเมล</th>
                        <th class="p-4 font-semibold">เบอร์ติดต่อ</th>
                        <th class="p-4 font-semibold">ตำแหน่งล่าสุด</th>
                        <th class="p-4 font-semibold">บริษัทล่าสุด</th>
                        <th class="p-4 font-semibold">ทักษะเด่น</th>
                    </tr>
                </thead>
                <tbody id="result-body" class="divide-y divide-gray-200">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // ====================================================================
        // ⚙️ ตั้งค่าระบบ (Hardcoded Settings for Groq)
        // ====================================================================
        
        // 1. นำ API Key ของ Groq (ขึ้นต้นด้วย gsk_) มาวาง (สามารถหั่นกุญแจบวกกันเพื่อหลบ GitHub ได้)
        const MY_API_KEY = "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";
        
        // 2. อัปเกรดรุ่น AI เป็น Llama 3.3 รุ่นล่าสุดที่ฉลาดกว่าเดิม
        const TARGET_MODEL = "llama-3.3-70b-versatile";
        
        // ====================================================================

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const statusMessage = document.getElementById('status-message');
        const statusText = document.getElementById('status-text');
        const resultContainer = document.getElementById('result-container');
        const resultBody = document.getElementById('result-body');
        const debugBox = document.getElementById('debug-box');
        const debugText = document.getElementById('debug-text');

        let extractedDataList = [];

        function showDebugError(errObj) {
            debugBox.classList.remove('hidden');
            let errString = typeof errObj === 'object' ? JSON.stringify(errObj, null, 2) : errObj;
            debugText.innerText = `[แจ้งเตือน]\n${errString}\n\n👉 วิธีแก้: ตรวจสอบ API Key ของ Groq อีกครั้ง (ต้องขึ้นต้นด้วย gsk_...)`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.addEventListener('dragover', (e) => e.preventDefault());
        window.addEventListener('drop', (e) => e.preventDefault());

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', (e) => { handleFiles(e.target.files); });

        async function handleFiles(files) {
            debugBox.classList.add('hidden');
            if (files.length === 0) return;
            
            if (MY_API_KEY === "ใส่_API_KEY_ของ_GROQ_ตรงนี้" || MY_API_KEY.trim() === "") {
                alert("⚠️ คุณยังไม่ได้ฝัง API Key ของ Groq ลงในโค้ดครับ!\n\nกรุณาเปิดไฟล์นี้ด้วยโปรแกรม Notepad แล้วนำ API Key มาใส่ก่อนใช้งานครับ");
                return;
            }
            if (!MY_API_KEY.includes("gsk_")) {
                alert("⚠️ API Key ของ Groq ต้องขึ้นต้นด้วย 'gsk_' นะครับ ลองตรวจสอบดูใหม่ครับ");
                return;
            }
            
            statusMessage.classList.remove('hidden');
            resultContainer.classList.remove('hidden');

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                if (file.type !== 'application/pdf') {
                    alert(`ไฟล์ ${file.name} ไม่ใช่ PDF ครับ (ขอข้ามไปก่อน)`);
                    continue;
                }

                try {
                    statusText.innerText = `[ไฟล์ ${i+1}/${files.length}] แกะข้อความ: ${file.name} ...`;
                    const rawText = await extractTextFromPDF(file);
                    
                    if (!rawText || rawText.trim() === "") {
                        throw new Error("ไฟล์ PDF เป็นรูปภาพสแกน ไม่มีตัวหนังสือให้แกะครับ");
                    }

                    statusText.innerText = `[ไฟล์ ${i+1}/${files.length}] Groq AI กำลังวิเคราะห์ข้อมูล...`;
                    const structuredData = await processWithAI(rawText);
                    
                    if(structuredData) {
                        extractedDataList.push(structuredData);
                        addRowToTable(structuredData);
                    }
                } catch (error) {
                    showDebugError(`เกิดปัญหาที่ไฟล์ ${file.name}:\n${error.message}`);
                }
            }

            statusMessage.classList.add('hidden');
            fileInput.value = ''; 
        }

        async function extractTextFromPDF(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = async function() {
                    try {
                        const typedarray = new Uint8Array(this.result);
                        const pdf = await pdfjsLib.getDocument(typedarray).promise;
                        let fullText = "";
                        for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                            const page = await pdf.getPage(pageNum);
                            const textContent = await page.getTextContent();
                            const pageText = textContent.items.map(item => item.str).join(" ");
                            fullText += pageText + " \n";
                        }
                        resolve(fullText);
                    } catch (error) {
                        reject(new Error("อ่าน PDF ไม่ได้ (ไฟล์อาจเสียหรือติดรหัสผ่าน)"));
                    }
                };
                reader.onerror = () => reject(new Error("เบราว์เซอร์อ่านไฟล์ล้มเหลว"));
                reader.readAsArrayBuffer(file);
            });
        }

        async function processWithAI(text) {
            const shortText = text.substring(0, 15000); 
            
            // อัปเดต: เปลี่ยนคำสั่งให้เป็นภาษาอังกฤษทั้งหมด เพื่อให้โมเดล Llama ทำงานในโหมด JSON ได้อย่างไม่มีข้อผิดพลาด
            const systemPrompt = `You are an expert HR recruiter. Extract the candidate's details from the provided resume text.
You MUST output ONLY a valid JSON object. Do not include any explanations or markdown formatting like \`\`\`json.
If any information is missing, leave the value as an empty string "".

Use the EXACT following JSON structure:
{
    "firstName": "Extract first name",
    "lastName": "Extract last name",
    "email": "Extract email",
    "phone": "Extract phone number",
    "recentJobTitle": "Extract most recent job title",
    "recentCompany": "Extract most recent company name",
    "skills": "Extract top 3-5 skills separated by commas"
}`;

            const apiUrl = `https://api.groq.com/openai/v1/chat/completions`;

            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${MY_API_KEY}`
                },
                body: JSON.stringify({
                    model: TARGET_MODEL,
                    response_format: { type: "json_object" },
                    messages: [
                        { role: "system", content: systemPrompt },
                        { role: "user", content: shortText }
                    ],
                    temperature: 0.1
                })
            });

            const result = await response.json();

            if (!response.ok || result.error) {
                let errMsg = result.error ? result.error.message : "เชื่อมต่อ Groq ไม่สำเร็จ";
                throw new Error("Groq ปฏิเสธการทำงาน: " + errMsg);
            }

            let jsonString = result.choices[0].message.content;
            jsonString = jsonString.replace(/```json/g, "").replace(/```/g, "").trim();
            
            return JSON.parse(jsonString);
        }

        function addRowToTable(data) {
            const tr = document.createElement('tr');
            tr.className = "hover:bg-orange-50 transition-colors";
            tr.innerHTML = `
                <td class="p-4 border-b text-gray-800">${data.firstName || '-'}</td>
                <td class="p-4 border-b text-gray-800">${data.lastName || '-'}</td>
                <td class="p-4 border-b text-orange-600 font-medium">${data.email || '-'}</td>
                <td class="p-4 border-b text-gray-800">${data.phone || '-'}</td>
                <td class="p-4 border-b font-semibold text-gray-700">${data.recentJobTitle || '-'}</td>
                <td class="p-4 border-b text-gray-800">${data.recentCompany || '-'}</td>
                <td class="p-4 border-b text-blue-600">${data.skills || '-'}</td>
            `;
            resultBody.appendChild(tr);
        }

        async function exportToExcel() {
            if (extractedDataList.length === 0) return alert("ยังไม่มีข้อมูลให้ส่งออกครับ");

            const workbook = new ExcelJS.Workbook();
            const worksheet = workbook.addWorksheet('ผู้สมัคร');

            worksheet.columns = [
                { header: 'ชื่อ', key: 'firstName', width: 15 }, { header: 'นามสกุล', key: 'lastName', width: 20 },
                { header: 'อีเมล', key: 'email', width: 30 }, { header: 'เบอร์ติดต่อ', key: 'phone', width: 15 },
                { header: 'ตำแหน่งล่าสุด', key: 'recentJobTitle', width: 30 }, { header: 'บริษัทล่าสุด', key: 'recentCompany', width: 25 },
                { header: 'ทักษะเด่น', key: 'skills', width: 45 }
            ];

            extractedDataList.forEach(data => worksheet.addRow(data));

            const headerRow = worksheet.getRow(1);
            headerRow.font = { bold: true, color: { argb: 'FFFFFFFF' } };
            headerRow.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFE65100' } }; 
            headerRow.alignment = { vertical: 'middle', horizontal: 'center' };

            worksheet.eachRow((row, rowNumber) => {
                row.eachCell((cell) => {
                    cell.border = { top: { style: 'thin' }, left: { style: 'thin' }, bottom: { style: 'thin' }, right: { style: 'thin' } };
                    if (rowNumber > 1) cell.alignment = { vertical: 'middle', wrapText: true }; 
                });
            });

            const buffer = await workbook.xlsx.writeBuffer();
            const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "HR_Smart_CV_Groq.xlsx");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
